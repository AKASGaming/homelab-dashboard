# =============================================================================
# TheaterNAS Control Center - Configuration
# All editable settings live here. No code changes required.
# =============================================================================

# --- Installation paths (do not change after install) ---
INSTALL_DIR="/opt/homelab-dashboard"
CACHE_DIR="/opt/homelab-dashboard/cache"
CONFIG_FILE="/opt/homelab-dashboard/config/config.conf"

# --- Display ---
THEME="default"
BANNER_TITLE="THEATERNAS CONTROL CENTER"
UI_REFRESH_INTERVAL=2

# --- Cache daemon ---
CACHE_INTERVAL=30
CACHE_TIMEOUT_DOCKER=120
CACHE_TIMEOUT_PIHOLE=30
CACHE_TIMEOUT_SPEEDTEST=300

# --- Container names ---
PIHOLE_CONTAINER="pihole"
PLEX_CONTAINER="plex"
TAILSCALE_CONTAINER="tailscale"

# Quick action containers (comma-separated, no spaces)
QUICK_ACTION_CONTAINERS="pihole,plex,tailscale"

# --- Pi-hole v6 API ---
PIHOLE_API_URL="http://127.0.0.1"
PIHOLE_API_PORT="80"
PIHOLE_API_PASSWORD=""
PIHOLE_API_TLS_VERIFY="false"

# --- Plex ---
PLEX_TOKEN=""
PLEX_URL="http://127.0.0.1:32400"

# --- GPU ---
GPU_ENABLED="true"
GPU_COMMAND="nvidia-smi"
GPU_QUERY_TIMEOUT=15

# --- Network ---
WAN_INTERFACE="eth0"
LAN_INTERFACE="eth0"
PING_TARGET="1.1.1.1"
PING_COUNT=3
DNS_TEST_HOST="google.com"

# Speedtest command: "speedtest" (Ookla) or "speedtest-cli"
SPEEDTEST_CMD="speedtest"
SPEEDTEST_ENABLED="true"

# --- WireGuard ---
WG_INTERFACES="wg0"

# --- Storage ---
SMART_DEVICES="auto"
LARGEST_DIRS_PATH="/"
LARGEST_DIRS_COUNT=10

# --- Logs ---
JOURNAL_LINES=50
DOCKER_LOG_LINES=100
KERNEL_LOG_LINES=50

# --- Screensaver ---
SCREENSAVER_ENABLED="true"
SCREENSAVER_IDLE_SECONDS=300
SCREENSAVER_STAR_COUNT=80

# --- Systemd service ---
CACHE_SERVICE_NAME="homelab-dashboard-cache"
CACHE_SERVICE_USER="root"

# --- Colors (overridden by theme when loaded) ---
COLOR_HEADER="96"
COLOR_BORDER="240"
COLOR_MENU_ACTIVE="226"
COLOR_MENU_INACTIVE="250"
COLOR_STATUS_OK="82"
COLOR_STATUS_WARN="220"
COLOR_STATUS_ERR="196"
COLOR_LABEL="245"
COLOR_VALUE="255"
COLOR_ACCENT="45"
COLOR_DIM="238"

# --- Feature toggles ---
FEATURE_DOCKER="true"
FEATURE_GPU="true"
FEATURE_MEDIA="true"
FEATURE_TAILSCALE="true"
FEATURE_WIREGUARD="true"
FEATURE_SPEEDTEST="true"
